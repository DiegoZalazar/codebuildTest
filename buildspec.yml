version: 0.2

env:
  variables:
    MY_PLAINTEXT_VAR: "hello-world"
  parameter-store:
    MY_SSM_VAR: "/accelerator/controltower/driftDetected"
  secrets-manager:
    MY_SECRET_VAR: "/InnovationSandbox/myisb/Auth/JwtSecret"

cache:
  key: "aws-$(codebuild-hash-files ssmparameters.txt)"
  paths: "/commands/*"
    
phases:
  install:
    commands:
      - echo "install phase"

  build:
    commands:
      - echo "build phase"
      - echo "Plaintext var= $MY_PLAINTEXT_VAR" 
      - echo "LZA drift SSM= $MY_SSM_VAR"  
      - echo "JwtSecret var= $MY_SECRET_VAR" 

  post_build:
    commands:
    - echo "post_build phase"
    - aws ssm describe-parameters > /commands/ssmparameters.txt
    
    - echo "Build completed on $(date)"


